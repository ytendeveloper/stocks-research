<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocks Research — v2</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#242836; --border:#2e3347;
    --text:#e4e6f0; --text-dim:#8b8fa8; --accent:#6c9fff;
    --green:#34d399; --red:#f87171; --orange:#fbbf24; --purple:#a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh; line-height:1.45;
  }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .header {
    background:linear-gradient(135deg,#1a1d27 0%,#242836 100%);
    border-bottom:1px solid var(--border);
    padding:24px 32px; display:flex; justify-content:space-between; align-items:center;
  }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .header h1 span { color:var(--accent); }
  .header .meta { color:var(--text-dim); font-size:12px; }

  .main { padding:28px 32px; max-width:1300px; margin:0 auto; }

  .section { margin-bottom:36px; }
  .section-title {
    font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:1.4px;
    color:var(--text-dim); margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title .badge {
    background:var(--accent); color:#0f1117;
    font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px;
  }

  /* --- LISTS --- */
  .lists-row { display:flex; flex-wrap:wrap; gap:10px; }
  .list-card {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:10px 18px; border-radius:14px;
    cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
    transition:all 0.15s;
  }
  .list-card:hover { border-color:var(--accent); color:var(--accent); }
  .list-card.active { background:var(--accent); color:#0f1117; border-color:var(--accent); }
  .list-card .count {
    background:rgba(255,255,255,0.12); padding:1px 8px; border-radius:20px;
    font-size:11px; font-weight:700;
  }
  .list-card.active .count { background:rgba(0,0,0,0.2); color:#0f1117; }

  /* --- TAG / THEME CARDS --- */
  .cards-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:14px;
  }
  .info-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:18px 20px; cursor:pointer;
    transition:border-color 0.2s, transform 0.15s;
  }
  .info-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .info-card.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .info-card.theme:hover { border-color:var(--purple); }
  .info-card.theme.active { border-color:var(--purple); box-shadow:0 0 0 1px var(--purple) inset; }
  .info-card h3 {
    font-size:15px; margin-bottom:4px;
    display:flex; align-items:center; gap:8px;
  }
  .info-card h3 .count {
    background:var(--surface2); color:var(--text-dim);
    font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px;
  }
  .info-card .desc {
    font-size:12px; color:var(--text-dim); margin:6px 0 12px; line-height:1.5;
  }
  .info-card .type-pill {
    display:inline-block; font-size:9px; text-transform:uppercase; letter-spacing:0.8px;
    color:var(--orange); border:1px solid rgba(251,191,36,0.35); padding:0 6px;
    border-radius:4px; margin-left:auto;
  }
  .info-card.theme .meta-tags {
    display:inline-flex; flex-wrap:wrap; gap:4px;
  }
  .info-card.theme .meta-tag {
    font-size:10px; color:var(--purple); background:rgba(167,139,250,0.1);
    border:1px solid rgba(167,139,250,0.25);
    padding:1px 6px; border-radius:4px;
    font-weight:600;
  }
  .info-card.theme h3 { flex-wrap:wrap; row-gap:4px; }
  .tickers-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .tickers-row .group-sep {
    flex-basis:100%; height:0; margin:6px 2px;
    border-top:1px dashed var(--border); opacity:0.6;
  }
  .ticker-chip {
    background:var(--surface2); border:1px solid var(--border); color:var(--accent);
    font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
    text-decoration:none; position:relative;
  }
  .ticker-chip:hover { background:var(--border); text-decoration:none; }
  .ticker-chip.top-rated {
    background:rgba(52,211,153,0.12); border-color:rgba(52,211,153,0.35);
    color:var(--green);
  }
  /* Size scaling by momentum magnitude: regular / medium (≥10%) / large (≥15%). */
  .ticker-chip.size-md { font-size:13px; padding:3px 11px; border-radius:7px; }
  .ticker-chip.size-lg { font-size:15px; padding:4px 13px; border-radius:8px; }
  .ticker-chip.size-md .mom-badge { font-size:10px; padding:1px 5px; }
  .ticker-chip.size-lg .mom-badge { font-size:11px; padding:1px 6px; }
  /* Momentum pills: two small badges after the ticker showing signed % values.
     First = 5-day, second = 5-week. Hidden when neither signal triggers. */
  .ticker-chip .mom-pair { display:inline-flex; gap:3px; margin-left:6px; vertical-align:middle; }
  .ticker-chip .mom-badge {
    font-size:9px; font-weight:700; letter-spacing:-0.3px;
    padding:1px 4px; border-radius:3px; line-height:1.25;
    border:1px solid transparent;
  }
  .ticker-chip .mom-badge.pos { color:var(--green); background:rgba(52,211,153,0.14); border-color:rgba(52,211,153,0.35); }
  .ticker-chip .mom-badge.neg { color:var(--red);   background:rgba(248,113,113,0.14); border-color:rgba(248,113,113,0.35); }
  .ticker-chip .mom-badge.dim { color:var(--text-dim); background:rgba(139,143,168,0.08); border-color:rgba(139,143,168,0.4); }

  /* --- SEARCH + TABLE --- */
  .search-row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  .search-bar {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px;
    color:var(--text); font-size:14px; flex:1 1 320px; outline:none;
  }
  .search-bar::placeholder { color:var(--text-dim); }
  .search-bar:focus { border-color:var(--accent); }
  .filter-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .filter-chip {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--accent); font-size:12px; padding:4px 8px 4px 10px; border-radius:14px;
  }
  .filter-chip .x { cursor:pointer; opacity:0.7; font-size:13px; padding:0 2px; }
  .filter-chip .x:hover { opacity:1; color:var(--red); }
  .filter-chip .label { color:var(--text-dim); margin-right:2px; }

  .stocks-table { width:100%; border-collapse:separate; border-spacing:0;
    background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .stocks-table th {
    text-align:left; padding:11px 14px; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--text-dim); background:var(--surface2);
    border-bottom:1px solid var(--border); cursor:pointer; user-select:none;
  }
  .stocks-table th:hover { color:var(--accent); }
  .stocks-table th .arrow { margin-left:4px; font-size:10px; opacity:0.4; }
  .stocks-table th.sorted .arrow { opacity:1; color:var(--accent); }
  .stocks-table td { padding:10px 14px; font-size:13px; border-bottom:1px solid var(--border); }
  .stocks-table tr:last-child td { border-bottom:none; }
  .stocks-table tr:hover td { background:rgba(108,159,255,0.04); }
  .stocks-table a { font-weight:600; }
  .positive { color:var(--green); } .negative { color:var(--red); }
  .neutral  { color:var(--text-dim); }
  .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .rating-cell { font-weight:600; }
  .rating-high { color:var(--green); }
  .rating-med  { color:var(--orange); }
  .rating-low  { color:var(--text-dim); }
  .empty-row { padding:30px; text-align:center; color:var(--text-dim); font-size:13px; }
  .list-pill {
    display:inline-block; font-size:10px; font-weight:600;
    background:rgba(108,159,255,0.1); border:1px solid rgba(108,159,255,0.3);
    color:var(--accent); padding:1px 6px; border-radius:4px; margin-right:3px;
  }

  @media (max-width: 720px) {
    .header { padding:18px 16px; flex-direction:column; align-items:flex-start; gap:6px; }
    .main { padding:20px 14px; }
    .section { margin-bottom:28px; }
    .cards-grid { grid-template-columns:1fr; }
    .stocks-table th, .stocks-table td { padding:9px 11px; font-size:12px; }
  }
</style>
</head>

      <div class="filter-chips" id="activeFilters"></div>

    <div class="table-scroll"><div id="tableMount"></div></div>
  </div>
</div>

// --- State ---
const state = { list:null, tag:null, theme:null, q:'', sortCol:null, sortDir:'desc' };

// --- Helpers ---
const $ = id => document.getElementById(id);
const cap = s => s ? s[0].toUpperCase() + s.slice(1) : s;
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function parseMcap(s) {
  if (!s) return 0;
  const m = String(s).replace(/[$,\s]/g,'').match(/([\d.]+)\s*([TBMK]?)/i);
  if (!m) return 0;
  const v = parseFloat(m[1]);
  const u = (m[2]||'').toUpperCase();
  return v * ({T:1e12,B:1e9,M:1e6,K:1e3}[u] || 1);
}

// --- Real spark data sourced from each stock's per-ticker JSON ---
const sparkData = {};
for (const t of Object.keys(DATA.stocks)) {
  const sm = DATA.stocks[t];
  sparkData[t] = {
    daily:  (sm.fiveDayChanges  || []).slice(-5),
    weekly: (sm.fiveWeekChanges || []).slice(-5),
  };
}
// Cumulative totals: prefer real cumulative % (compounded) when present, else fall back to sum of period changes.
function momTotals(t) {
  const sm = DATA.stocks[t] || {};
  const sd = sparkData[t] || {daily:[], weekly:[]};
  return {
    d: sm.fiveDayChangePct  != null ? sm.fiveDayChangePct  : sparkSum(sd.daily),
    w: sm.fiveWeekChangePct != null ? sm.fiveWeekChangePct : sparkSum(sd.weekly),
  };
}
function miniBarSvg(values, w, h) {
  const n = values.length;
  const maxAbs = Math.max(...values.map(Math.abs), 0.5);
  const barW = Math.floor((w-(n-1)*2)/n);
  const mid = h/2;
  const bars = values.map((v,i) => {
    const barH = Math.max(1, Math.abs(v)/maxAbs*(mid-1));
    const x = i*(barW+2);
    const color = v>=0 ? '#34d399' : '#f87171';
    const y = v>=0 ? mid-barH : mid;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="1" fill="${color}" opacity="0.85"/>`;
  }).join('');
  const zeroLine = `<line x1="0" y1="${mid}" x2="${w}" y2="${mid}" stroke="#2e3347" stroke-width="0.5"/>`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;display:inline-block">${zeroLine}${bars}</svg>`;
}
function sparkSum(arr){ return (arr||[]).reduce((a,b)=>a+b,0); }

// Bucket for momentum ordering (uses same thresholds as indicator trigger):
//   0 = 5w gainer (>10%)   1 = 5d gainer (>5%)
//   2 = 5d loser (<-5%)    3 = 5w loser (<-10%)
//   4 = rest (no significant move; not a gainer or loser by threshold)
function momBucket(d, w) {
  if (w > 10) return 0;
  if (d > 5) return 1;
  if (d < -5) return 2;
  if (w < -10) return 3;
  return 4;
}

function sortByMomentum(list) {
  return list.slice().sort((a, b) => {
    const ma = momTotals(a), mb = momTotals(b);
    const ba = momBucket(ma.d, ma.w), bb = momBucket(mb.d, mb.w);
    if (ba !== bb) return ba - bb;
    if (ba === 0) return mb.w - ma.w;
    if (ba === 1) return mb.d - ma.d;
    if (ba === 2) return ma.d - mb.d;
    if (ba === 3) return ma.w - mb.w;
    return a.localeCompare(b);
  });
}

// Section key: gainers (buckets 0,1), losers (2,3), rest (4).
function sectionOf(d, w) {
  const b = momBucket(d, w);
  if (b <= 1) return 'g';
  if (b <= 3) return 'l';
  return 'r';
}

// Sorted ticker chips with a visual separator between gainers / losers / rest.
function chipsWithSeparators(tickerList) {
  const sorted = sortByMomentum(tickerList);
  let prevSec = null;
  return sorted.map(t => {
    const m = momTotals(t);
    const sec = sectionOf(m.d, m.w);
    const sep = (prevSec !== null && sec !== prevSec) ? '<span class="group-sep"></span>' : '';
    prevSec = sec;
    return sep + tickerChipHtml(t);
  }).join('');
}

// Size class based on larger magnitude. ≥15%: large, ≥10%: medium, else regular.
function sizeClassFor(d, w) {
  const m = Math.max(Math.abs(d), Math.abs(w));
  if (m >= 15) return ' size-lg';
  if (m >= 10) return ' size-md';
  return '';
}

// Compose a ticker chip with optional rating (green border) + momentum pills + size scaling.
function tickerChipHtml(t) {
  const sm = DATA.stocks[t] || {};
  const sc = sm.score || 0;
  const m = momTotals(t);
  const dT = m.d, wT = m.w;
  const dHit = Math.abs(dT) > 5;
  const wHit = Math.abs(wT) > 10;
  let cls = 'ticker-chip';
  if (sc >= 4) cls += ' top-rated';
  cls += sizeClassFor(dT, wT);
  let indicator = '';
  if (dHit || wHit) {
    const fmt = v => (v >= 0 ? '+' : '') + Math.round(v);
    const colorOf = v => Math.abs(v) >= 5 ? (v >= 0 ? 'pos' : 'neg') : 'dim';
    indicator = `<span class="mom-pair"><span class="mom-badge ${colorOf(dT)}" title="5-day">${fmt(dT)}</span><span class="mom-badge ${colorOf(wT)}" title="5-week">${fmt(wT)}</span></span>`;
  }
  return `<a href="stock-detail.html?ticker=${t}" class="${cls}" title="5d: ${dT.toFixed(1)}%  5w: ${wT.toFixed(1)}%" onclick="event.stopPropagation()">${t}${indicator}</a>`;
}

// --- Render LISTS ---
function renderLists() {
  const names = DATA.lists.names;
  $('listsRow').innerHTML = names.map(n => {
    const count = (DATA.lists.index[n] || []).length;
    const active = state.list === n ? ' active' : '';
    return `<button class="list-card${active}" data-list="${esc(n)}" onclick="toggleList('${esc(n)}')">${esc(cap(n))} <span class="count">${count}</span></button>`;
  }).join('');
}

function toggleList(name) {
  state.list = state.list === name ? null : name;
  renderLists(); renderActiveFilters(); renderTable();
}

// --- Render TAGS ---
function renderTags() {
  const entries = Object.entries(DATA.tags).filter(([,v]) => v.tickers.length > 0);
  $('tagsBadge').textContent = entries.length;
  $('tagsGrid').innerHTML = entries.map(([name, info]) => {
    const active = state.tag === name ? ' active' : '';
    const tickers = chipsWithSeparators(info.tickers);
    const typePill = info.type === 'dynamic' ? `<span class="type-pill">dynamic</span>` : '';
    return `<div class="info-card${active}" onclick="toggleTag('${esc(name)}')">
      <h3>${esc(name)} <span class="count">${info.tickers.length}</span>${typePill}</h3>
      <div class="desc">${esc(info.description)}</div>
      <div class="tickers-row">${tickers}</div>
    </div>`;
  }).join('') || `<div class="empty-row" style="grid-column:1/-1">No tags with tickers.</div>`;
}

function toggleTag(name) {
  state.tag = state.tag === name ? null : name;
  renderTags(); renderActiveFilters(); renderTable();
}

// --- Render THEMES ---
function renderThemes() {
  const entries = Object.entries(DATA.themes).filter(([,v]) => v.tickers.length > 0);
  $('themesBadge').textContent = entries.length;
  $('themesGrid').innerHTML = entries.map(([name, info]) => {
    const active = state.theme === name ? ' active' : '';
    const tagsHtml = info.tags.map(t => `<span class="meta-tag">${esc(t)}</span>`).join('');
    const tickers = chipsWithSeparators(info.tickers);
    return `<div class="info-card theme${active}" onclick="toggleTheme('${esc(name)}')">
      <h3>${esc(name)} <span class="count">${info.tickers.length}</span> <span class="meta-tags">${tagsHtml}</span></h3>
      <div class="desc">${esc(info.description)}</div>
      <div class="tickers-row">${tickers}</div>
    </div>`;
  }).join('') || `<div class="empty-row" style="grid-column:1/-1">No themes with tickers.</div>`;
}

function toggleTheme(name) {
  state.theme = state.theme === name ? null : name;
  renderThemes(); renderActiveFilters(); renderTable();
}

// --- Active filter chips ---
function renderActiveFilters() {
  const chips = [];
  if (state.list)  chips.push(`<span class="filter-chip"><span class="label">list:</span>${esc(cap(state.list))} <span class="x" onclick="clearFilter('list')">×</span></span>`);
  if (state.tag)   chips.push(`<span class="filter-chip"><span class="label">tag:</span>${esc(state.tag)} <span class="x" onclick="clearFilter('tag')">×</span></span>`);
  if (state.theme) chips.push(`<span class="filter-chip"><span class="label">theme:</span>${esc(state.theme)} <span class="x" onclick="clearFilter('theme')">×</span></span>`);
  $('activeFilters').innerHTML = chips.join('');
}
function clearFilter(kind) {
  state[kind] = null;
  renderLists(); renderTags(); renderThemes(); renderActiveFilters(); renderTable();
}

// --- TABLE ---
const COLS = [
  { k:'ticker', label:'Ticker', sort:(a,b)=>a.ticker.localeCompare(b.ticker) },
  { k:'name',   label:'Name',   sort:(a,b)=>a.name.localeCompare(b.name) },
  { k:'score',  label:'Score',  sort:(a,b)=>(a.score||0)-(b.score||0) },
  { k:'sector', label:'Sector', sort:(a,b)=>(a.sector||'').localeCompare(b.sector||'') },
  { k:'price',  label:'Price',  sort:(a,b)=>(a.price||0)-(b.price||0) },
  { k:'change', label:'Change', sort:(a,b)=>(a.changePct||0)-(b.changePct||0) },
  { k:'daily5', label:'5-Day',  sort:(a,b)=>sparkSum(sparkData[a.ticker]?.daily)-sparkSum(sparkData[b.ticker]?.daily) },
  { k:'weekly5',label:'5-Week', sort:(a,b)=>sparkSum(sparkData[a.ticker]?.weekly)-sparkSum(sparkData[b.ticker]?.weekly) },
  { k:'mcap',   label:'Market Cap', sort:(a,b)=>parseMcap(a.marketCap)-parseMcap(b.marketCap) },
];

function filteredRows() {
  const q = state.q.toLowerCase();
  const tickerToLists = DATA.lists.tickers;
  let rows = Object.entries(DATA.stocks).map(([ticker, sm]) => ({
    ticker, ...sm,
    lists: tickerToLists[ticker] || [],
  }));
  if (state.list)  rows = rows.filter(r => r.lists.includes(state.list));
  if (state.tag)   rows = rows.filter(r => r.tags.includes(state.tag) || r.derivedTags.includes(state.tag));
  if (state.theme) {
    const set = new Set(DATA.themes[state.theme].tags);
    rows = rows.filter(r => r.tags.some(x => set.has(x)) || r.derivedTags.some(x => set.has(x)));
  }
  if (q) rows = rows.filter(r =>
    r.ticker.toLowerCase().includes(q) ||
    (r.name||'').toLowerCase().includes(q) ||
    (r.sector||'').toLowerCase().includes(q) ||
    r.tags.some(t => t.toLowerCase().includes(q)) ||
    r.derivedTags.some(t => t.toLowerCase().includes(q)));
  if (state.sortCol) {
    const c = COLS.find(c => c.k === state.sortCol);
    rows.sort((a,b) => {
      const r = c.sort(a,b);
      return state.sortDir === 'asc' ? r : -r;
    });
  }
  return rows;
}

function renderTable() {
  const rows = filteredRows();
  $('stockCount').textContent = rows.length;
  if (!rows.length) {
    $('tableMount').innerHTML = `<div class="empty-row">No stocks match the filters.</div>`;
    return;
  }
  const ths = COLS.map(c => {
    const arrow = state.sortCol === c.k ? (state.sortDir === 'asc' ? '▲' : '▼') : '▲';
    const cls = state.sortCol === c.k ? ' class="sorted"' : '';
    return `<th${cls} onclick="onSort('${c.k}')">${c.label}<span class="arrow">${arrow}</span></th>`;
  }).join('');
  const body = rows.map(r => {
    const chCls = (r.changePct||0) > 0 ? 'positive' : (r.changePct||0) < 0 ? 'negative' : 'neutral';
    const chSign = (r.changePct||0) > 0 ? '+' : '';
    const sc = r.score || 0;
    const scCls = sc >= 4 ? 'rating-high' : sc >= 3 ? 'rating-med' : 'rating-low';
    const scaleMax = (r.scoreScale||'1-5').split('-').pop();
    const sd = sparkData[r.ticker] || {daily:[], weekly:[]};
    const dT = sparkSum(sd.daily), wT = sparkSum(sd.weekly);
    const dCls = dT>=0?'positive':'negative', wCls = wT>=0?'positive':'negative';
    const dSign = dT>=0?'+':'', wSign = wT>=0?'+':'';
    return `<tr>
      <td><a href="stock-detail.html?ticker=${r.ticker}">${r.ticker}</a></td>
      <td>${esc(r.name||'')}</td>
      <td class="rating-cell ${scCls}">${r.score != null ? r.score + '/' + scaleMax : '—'}</td>
      <td>${esc(r.sector||'—')}</td>
      <td>${r.price != null ? '$' + r.price.toFixed(2) : '—'}</td>
      <td class="${chCls}">${r.changePct != null ? chSign + r.changePct + '%' : '—'}</td>
      <td style="white-space:nowrap;padding:4px 10px">${miniBarSvg(sd.daily, 60, 22)} <span class="${dCls}" style="font-size:11px;font-weight:600">${dSign}${dT.toFixed(1)}%</span></td>
      <td style="white-space:nowrap;padding:4px 10px">${miniBarSvg(sd.weekly, 60, 22)} <span class="${wCls}" style="font-size:11px;font-weight:600">${wSign}${wT.toFixed(1)}%</span></td>
      <td>${esc(r.marketCap||'—')}</td>
    </tr>`;
  }).join('');
  $('tableMount').innerHTML = `<table class="stocks-table"><thead><tr>${ths}</tr></thead><tbody>${body}</tbody></table>`;
}

function onSort(k) {
  if (state.sortCol === k) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  else { state.sortCol = k; state.sortDir = (k === 'ticker' || k === 'name' || k === 'sector') ? 'asc' : 'desc'; }
  renderTable();
}

// --- Init ---
$('builtAt').textContent = DATA.meta.builtAt;
$('searchInput').addEventListener('input', e => { state.q = e.target.value; renderTable(); });
renderLists(); renderTags(); renderThemes(); renderActiveFilters(); renderTable();
</script>
