<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Detail</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e4e6f0;
    --text-dim: #8b8fa8;
    --accent: #6c9fff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.45;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .topbar .back { color: var(--text-dim); font-size: 13px; }

  .hero {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 28px 32px; margin-bottom: 28px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center;
  }
  .hero .ident .ticker { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .hero .ident .name { color: var(--text-dim); font-size: 16px; margin-top: 4px; }
  .hero .ident .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .hero .quote { text-align: right; }
  .hero .quote .price { font-size: 32px; font-weight: 700; }
  .hero .quote .change { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .hero .quote .asof { color: var(--text-dim); font-size: 11px; margin-top: 6px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral  { color: var(--text-dim); }

  .score-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(108,159,255,0.1);
    border: 1px solid rgba(108,159,255,0.35);
    color: var(--accent);
    font-size: 12px; font-weight: 700;
    padding: 6px 12px; border-radius: 20px;
    margin-top: 12px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 26px;
    margin-bottom: 20px;
  }
  .section h2 {
    font-size: 16px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section h2 .count {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px; padding: 1px 8px; border-radius: 20px;
  }

  .kv-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px 28px;
  }
  .kv .k { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 2px; }
  .kv .v { font-size: 14px; font-weight: 500; }

  .tag-chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px; font-weight: 600;
    padding: 2px 9px; border-radius: 6px;
  }
  .tag-chip.theme { color: var(--purple); border-color: rgba(167,139,250,0.3); }
  .tag-chip.action { color: var(--orange); border-color: rgba(251,191,36,0.35); }

  .note {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .note:last-child { margin-bottom: 0; }
  .note .meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    color: var(--text-dim); font-size: 11px; margin-bottom: 8px;
  }
  .note .meta .date { font-weight: 600; color: var(--text); }
  .note .body { font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
  .note .images {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
  }
  .note .image {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    max-width: 220px;
  }
  .note .image img {
    display: block; width: 100%; height: auto; cursor: zoom-in;
  }
  .note .image .caption {
    font-size: 11px; color: var(--text-dim);
    padding: 6px 10px; border-top: 1px solid var(--border);
  }
  .note .image .kind {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--accent); margin-right: 4px;
  }

  table.simple {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table.simple th, table.simple td {
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  table.simple th {
    color: var(--text-dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  }
  table.simple tr:last-child td { border-bottom: none; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .case-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .case {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .case h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .case.bull h3 { color: var(--green); }
  .case.bear h3 { color: var(--red); }
  .case ul { list-style: none; }
  .case li { font-size: 13px; padding: 4px 0 4px 16px; position: relative; line-height: 1.5; }
  .case li::before {
    content: "•"; position: absolute; left: 0;
  }
  .case.bull li::before { color: var(--green); }
  .case.bear li::before { color: var(--red); }

  .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .impact-high   { color: var(--red); }
  .impact-medium { color: var(--orange); }
  .impact-low    { color: var(--text-dim); }
  .sev-high   { color: var(--red); }
  .sev-medium { color: var(--orange); }
  .sev-low    { color: var(--text-dim); }

  .news-item {
    display: grid; grid-template-columns: 90px 1fr auto;
    gap: 14px; align-items: start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-item .date { font-size: 11px; color: var(--text-dim); padding-top: 2px; }
  .news-item .headline { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .news-item .source { font-size: 11px; color: var(--text-dim); }
  .news-item .summary { font-size: 13px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .sentiment-positive { color: var(--green); }
  .sentiment-negative { color: var(--red); }
  .sentiment-neutral  { color: var(--text-dim); }

  .footer-meta {
    color: var(--text-dim); font-size: 11px;
    text-align: center; margin-top: 28px;
  }

  .rev-grid {
    display: grid; grid-template-columns: 3fr 2fr; gap: 24px;
  }
  .rev-grid h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 10px;
  }
  .rev-chart svg { width: 100%; height: auto; }

  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 24px; cursor: zoom-out;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

  @media (max-width: 720px) {
    .wrap { padding: 20px 14px 48px; }
    .hero { grid-template-columns: 1fr; padding: 22px; }
    .hero .quote { text-align: left; }
    .case-grid { grid-template-columns: 1fr; }
    .news-item { grid-template-columns: 70px 1fr; }
    .news-item .sentiment { grid-column: 2; }
    .section { padding: 18px 18px; }
    .rev-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div><a href="../../dashboard-v2.html" class="back">← Dashboard</a></div>
    <div class="back" id="lastUpdated"></div>
  </div>

  <div class="hero" id="hero"></div>

  <div class="section" id="userNotesSection">
    <h2>My Notes <span class="count" id="userNotesCount">0</span></h2>
    <div id="userNotesBody"></div>
  </div>

  <div class="section" id="claudeSection">
    <h2>Claude Analysis</h2>
    <div id="claudeBody"></div>
  </div>

  <div class="section" id="newsSection">
    <h2>News <span class="count" id="newsCount">0</span></h2>
    <div id="newsBody"></div>
  </div>

  <div class="section" id="revenueSection">
    <h2>Revenue Growth</h2>
    <div id="revenueBody"></div>
  </div>

  <div class="section" id="ownershipSection">
    <h2>Ownership</h2>
    <div id="ownershipBody"></div>
  </div>

  <div class="section" id="staticSection">
    <h2>Company</h2>
    <div id="staticBody"></div>
  </div>

  <div class="section" id="dailySection">
    <h2>Daily Snapshot</h2>
    <div id="dailyBody"></div>
  </div>

  <div class="section" id="quarterlySection">
    <h2>Quarterly Results <span class="count" id="quarterlyCount">0</span></h2>
    <div id="quarterlyBody"></div>
  </div>

  <div class="section" id="annualSection">
    <h2>Annual Results <span class="count" id="annualCount">0</span></h2>
    <div id="annualBody"></div>
  </div>

  <div class="section" id="linksSection">
    <h2>Links</h2>
    <div id="linksBody"></div>
  </div>

  <div class="footer-meta" id="footerMeta"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" alt="">
</div>

<script>
const STOCK = {"ticker":"UMAC","schemaVersion":"1.0","static":{"name":"Unusual Machines","exchange":"","sector":"Defense/Drones","industry":"","country":"USA","headquarters":"","founded":null,"ipoDate":"","ceo":"","employees":null,"website":"","description":"U.S.-made drone components. Benefits from DJI ban / NDAA compliance.","businessSegments":[],"tags":["space"],"themes":["Defense + Drones"]},"userNotes":[],"daily":{"asOf":"2026-05-23","price":16.78,"change":1.98,"changePct":13.38,"volume":6924100,"avgVolume":3776170,"dayHigh":16.88,"dayLow":14.76,"fiftyTwoWeekHigh":23.38,"fiftyTwoWeekLow":4.81,"marketCap":"$802M","history":[{"date":"2026-05-22","close":16.78,"change":13.38,"volume":6924100},{"date":"2026-05-21","close":14.8,"change":2.99,"volume":2579000},{"date":"2026-05-20","close":14.37,"change":5.2,"volume":2601900},{"date":"2026-05-19","close":13.66,"change":-5.47,"volume":3706400},{"date":"2026-05-18","close":14.45,"change":-10.8,"volume":5564200}],"fiveDayChangePct":3.58,"fiveWeekChangePct":19.09,"fiveDayChanges":[-10.8,-5.47,5.2,2.99,13.38],"fiveWeekChanges":[3.97,-3.14,-5.43,20.72,3.58]},"ttm":{"asOf":"2026-05-22","revenue":"$11.2M FY25","revenueGrowth":2.96,"pe":"N/A","profitable":false,"backlog":"N/A"},"quarterly":[],"annual":[],"claude":{"lastAnalyzedAt":"2026-05-22","score":3.0,"scoreScale":"1-5","conviction":"","stance":"","thesis":"U.S.-made drone components. Benefits from DJI ban / NDAA compliance. Picks-and-shovels, fortress balance sheet.","bullCase":["Components to 50%+ Drone Dominance winners","$220M cash","Lantronix on $1.1B program"],"bearCase":["Small revenue","component supplier margins","$760M on $27M rev"],"catalysts":[],"risks":[],"valuation":{},"notes":[],"derivedTags":["small-cap","unprofitable"]},"news":[],"ownership":{},"links":{"investorRelations":"","secFilings":"","earningsCallTranscripts":"","researchPage":"stock-detail.html?ticker=UMAC"},"meta":{"createdAt":"2026-05-22","updatedAt":"2026-05-23","schemaVersion":"1.0","dataSources":["migrated-from-legacy-data.json"]}};

// --- Helpers ---
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtPct = n => n == null ? '—' : (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
const fmtSignedPct = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const fmtSignedNum = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2);
const fmtNum = n => n == null ? '—' : n.toLocaleString();
const fmtMoney = v => v == null ? '—' : (typeof v === 'number' ? '$' + v.toLocaleString(undefined,{maximumFractionDigits:2}) : v);
const signCls = n => n == null ? 'neutral' : (n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral');

function renderImages(images) {
  if (!images || !images.length) return '';
  const items = images.map(im => `
    <div class="image">
      <img src="${esc(im.path)}" alt="${esc(im.caption||'')}" onclick="openLightbox('${esc(im.path)}')">
      ${im.caption || im.kind ? `<div class="caption">${im.kind ? `<span class="kind">${esc(im.kind)}</span>` : ''}${esc(im.caption||'')}</div>` : ''}
    </div>`).join('');
  return `<div class="images">${items}</div>`;
}

function openLightbox(src) {
  $('lightboxImg').src = src;
  $('lightbox').classList.add('show');
}

function parseMoneyToM(s) {
  if (s == null) return 0;
  const str = String(s).replace(/[$,\s]/g, '');
  const m = str.match(/^(-?[\d.]+)\s*([TBMK]?)/i);
  if (!m) return 0;
  const v = parseFloat(m[1]);
  const u = (m[2] || '').toUpperCase();
  return u === 'T' ? v * 1e6 : u === 'B' ? v * 1e3 : u === 'M' ? v : u === 'K' ? v / 1e3 : v / 1e6;
}

function revBarChart(data, w, h, patternId) {
  if (!data.length) return '<div class="neutral" style="font-size:13px">No data.</div>';
  const max = Math.max(...data.map(d => d.value), 0.001);
  const n = data.length;
  const padX = 14, padTop = 28, padBottom = 42;
  const chartW = w - padX * 2;
  const chartH = h - padTop - padBottom;
  const slot = chartW / n;
  const barW = slot * 0.62;
  const hasProj = data.some(d => d.projected);
  const pid = patternId || 'rev-hatch';
  const defs = hasProj ? `<defs><pattern id="${pid}" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)"><rect width="6" height="6" fill="#a78bfa" opacity="0.18"/><line x1="0" y1="0" x2="0" y2="6" stroke="#a78bfa" stroke-width="2.5" opacity="0.85"/></pattern></defs>` : '';
  const bars = data.map((d, i) => {
    const x = padX + i * slot + (slot - barW) / 2;
    const barH = Math.max(2, (d.value / max) * chartH);
    const y = padTop + chartH - barH;
    const fill = d.projected ? `url(#${pid})` : '#6c9fff';
    const opacity = d.projected ? '1' : '0.85';
    const strokeAttrs = d.projected ? ' stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"' : '';
    const yoyColor = d.yoy == null ? '#8b8fa8' : d.yoy >= 0 ? '#34d399' : '#f87171';
    const yoyText = d.yoy == null ? '' : (d.yoy >= 0 ? '+' : '') + Math.round(d.yoy * 100) + '%';
    const labelText = d.label + (d.projected ? ' (est.)' : '');
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="3" fill="${fill}" opacity="${opacity}"${strokeAttrs}/>
      ${yoyText ? `<text x="${(x + barW/2).toFixed(1)}" y="${(y - 6).toFixed(1)}" text-anchor="middle" fill="${yoyColor}" font-size="10" font-weight="700">${yoyText}</text>` : ''}
      <text x="${(x + barW/2).toFixed(1)}" y="${(padTop + chartH + 16).toFixed(1)}" text-anchor="middle" fill="#e4e6f0" font-size="11" font-weight="600">${esc(d.display)}</text>
      <text x="${(x + barW/2).toFixed(1)}" y="${(padTop + chartH + 30).toFixed(1)}" text-anchor="middle" fill="${d.projected ? '#a78bfa' : '#8b8fa8'}" font-size="10">${esc(labelText)}</text>
    `;
  }).join('');
  const baseline = `<line x1="${padX}" y1="${padTop + chartH + 0.5}" x2="${w - padX}" y2="${padTop + chartH + 0.5}" stroke="#2e3347"/>`;
  return `<svg viewBox="0 0 ${w} ${h}" class="rev-svg" preserveAspectRatio="xMidYMid meet">${defs}${baseline}${bars}</svg>`;
}

function renderRevenue(s) {
  const qsAll = (s.quarterly || []).slice().sort((a,b) => (a.period < b.period ? -1 : 1));
  const ysAll = (s.annual || []).slice().sort((a,b) => a.year - b.year);
  const qs = qsAll.slice(-8);
  const ysHist = ysAll.filter(y => !y.projected).slice(-3);
  const ysProj = ysAll.filter(y => y.projected);
  const ys = [...ysHist, ...ysProj];
  const qData = qs.map(q => ({
    label: q.period.replace(/^(\d{4})-Q(\d)/, "Q$2 '$1").replace(" '20", " '"),
    value: parseMoneyToM(q.revenue),
    yoy: q.revenueYoY,
    display: q.revenue || '—'
  }));
  const yData = ys.map(y => ({
    label: String(y.year),
    value: parseMoneyToM(y.revenue),
    yoy: y.revenueYoY,
    display: y.revenue || '—',
    projected: !!y.projected
  }));
  const legend = ysProj.length
    ? `<div style="display:flex;gap:14px;font-size:11px;color:var(--text-dim);margin-top:8px;align-items:center;flex-wrap:wrap">
         <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:12px;height:10px;background:#6c9fff;opacity:0.85;border-radius:2px"></span>Actual</span>
         <span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:12px;height:10px;background:repeating-linear-gradient(-45deg,#a78bfa 0 2px,transparent 2px 5px);border:1px dashed #a78bfa;border-radius:2px"></span>Projected (analyst consensus)</span>
       </div>`
    : '';
  $('revenueBody').innerHTML = `
    <div class="rev-grid">
      <div class="rev-chart">
        <h3>Last 8 Quarters</h3>
        ${revBarChart(qData, 560, 220, 'hatch-q')}
      </div>
      <div class="rev-chart">
        <h3>Last 3 Years + Projected</h3>
        ${revBarChart(yData, 380, 220, 'hatch-y')}
        ${legend}
      </div>
    </div>`;
}

// --- Renderers ---
function renderHero(s) {
  const d = s.daily || {};
  const score = s.claude?.score, scale = s.claude?.scoreScale || '5';
  const chCls = signCls(d.change);
  const chSign = d.change > 0 ? '+' : '';
  const tagsHtml = (s.static.tags || []).map(t => `<span class="tag-chip">#${esc(t)}</span>`).join('') +
                   (s.static.themes || []).map(t => `<span class="tag-chip theme">${esc(t)}</span>`).join('');
  $('hero').innerHTML = `
    <div class="ident">
      <div class="ticker">${esc(s.ticker)}</div>
      <div class="name">${esc(s.static.name)} · ${esc(s.static.exchange)} · ${esc(s.static.sector)}</div>
      <div class="tags">${tagsHtml}</div>
      ${score != null ? `<div class="score-pill">★ Claude score: ${score} / ${scale.split('-').pop()}</div>` : ''}
    </div>
    <div class="quote">
      <div class="price">${fmtMoney(d.price)}</div>
      <div class="change ${chCls}">${chSign}${d.change != null ? d.change.toFixed(2) : '—'} (${fmtSignedPct(d.changePct)})</div>
      <div class="asof">As of ${esc(d.asOf || '—')}</div>
    </div>`;
}

function renderStatic(s) {
  const st = s.static || {};
  const fields = [
    ['Industry', st.industry],
    ['Headquarters', st.headquarters],
    ['Country', st.country],
    ['Founded', st.founded],
    ['IPO Date', st.ipoDate],
    ['CEO', st.ceo],
    ['Employees', fmtNum(st.employees)],
    ['Website', st.website ? `<a href="${esc(st.website)}" target="_blank" rel="noopener">${esc(st.website.replace(/^https?:\/\//,''))}</a>` : null],
    ['Segments', (st.businessSegments || []).join(', ')]
  ].filter(([,v]) => v != null && v !== '');
  $('staticBody').innerHTML = `
    <p style="margin-bottom:16px;line-height:1.6">${esc(st.description || '')}</p>
    <div class="kv-grid">
      ${fields.map(([k,v]) => `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`).join('')}
    </div>`;
}

function renderUserNotes(s) {
  const notes = s.userNotes || [];
  $('userNotesCount').textContent = notes.length;
  if (!notes.length) { $('userNotesBody').innerHTML = '<div class="neutral" style="font-size:13px">No notes yet.</div>'; return; }
  $('userNotesBody').innerHTML = notes.map(n => `
    <div class="note">
      <div class="meta">
        <span class="date">${esc(n.date)}</span>
        ${n.action ? `<span class="tag-chip action">${esc(n.action)}</span>` : ''}
        ${(n.tags||[]).map(t => `<span class="tag-chip">#${esc(t)}</span>`).join('')}
      </div>
      <div class="body">${esc(n.note)}</div>
      ${renderImages(n.images)}
    </div>`).join('');
}

function renderDaily(s) {
  const d = s.daily || {};
  const rangeCells = (lo, hi) => lo != null && hi != null ? `${fmtMoney(lo)} – ${fmtMoney(hi)}` : '—';
  const fields = [
    ['Market Cap', d.marketCap],
    ['Volume', fmtNum(d.volume)],
    ['Avg Volume', fmtNum(d.avgVolume)],
    ['Day Range', rangeCells(d.dayLow, d.dayHigh)],
    ['52-Week Range', rangeCells(d.fiftyTwoWeekLow, d.fiftyTwoWeekHigh)]
  ];
  const histRows = (d.history || []).map(h => `
    <tr>
      <td>${esc(h.date)}</td>
      <td>${fmtMoney(h.close)}</td>
      <td class="${signCls(h.change)}">${fmtSignedNum(h.change)}</td>
      <td>${fmtNum(h.volume)}</td>
    </tr>`).join('');
  $('dailyBody').innerHTML = `
    <div class="kv-grid" style="margin-bottom:18px">
      ${fields.map(([k,v]) => `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`).join('')}
    </div>
    ${histRows ? `
      <div class="table-scroll">
        <table class="simple">
          <thead><tr><th>Date</th><th>Close</th><th>Change</th><th>Volume</th></tr></thead>
          <tbody>${histRows}</tbody>
        </table>
      </div>` : ''}`;
}

function renderQuarterly(s) {
  const qs = s.quarterly || [];
  $('quarterlyCount').textContent = qs.length;
  if (!qs.length) { $('quarterlyBody').innerHTML = '<div class="neutral" style="font-size:13px">No quarterly data.</div>'; return; }
  $('quarterlyBody').innerHTML = qs.map(q => {
    const fields = [
      ['Report Date', q.reportDate],
      ['Revenue', q.revenue],
      ['Rev YoY', fmtPct(q.revenueYoY)],
      ['Gross Margin', fmtPct(q.grossMargin)],
      ['Operating Income', q.operatingIncome],
      ['Net Income', q.netIncome],
      ['EPS', q.eps != null ? q.eps.toFixed(2) : null],
      ['EPS Est.', q.epsEstimate != null ? q.epsEstimate.toFixed(2) : null],
      ['Free Cash Flow', q.freeCashFlow],
      ['Cash on Hand', q.cashOnHand],
      ['Backlog', q.backlog]
    ].filter(([,v]) => v != null && v !== '');
    return `
      <div class="note">
        <div class="meta"><span class="date">${esc(q.period)}</span></div>
        <div class="kv-grid" style="margin-bottom:10px">
          ${fields.map(([k,v]) => `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}
        </div>
        ${q.guidance ? `<div class="body"><strong style="color:var(--accent)">Guidance:</strong> ${esc(q.guidance)}</div>` : ''}
        ${q.notes ? `<div class="body" style="margin-top:6px">${esc(q.notes)}</div>` : ''}
      </div>`;
  }).join('');
}

function renderAnnual(s) {
  const as = s.annual || [];
  $('annualCount').textContent = as.length;
  if (!as.length) { $('annualBody').innerHTML = '<div class="neutral" style="font-size:13px">No annual data.</div>'; return; }
  const rows = as.map(a => `
    <tr>
      <td><strong>${esc(a.year)}</strong></td>
      <td>${esc(a.revenue || '—')}</td>
      <td>${fmtPct(a.revenueYoY)}</td>
      <td>${fmtPct(a.grossMargin)}</td>
      <td>${esc(a.operatingIncome || '—')}</td>
      <td>${esc(a.netIncome || '—')}</td>
      <td>${a.eps != null ? a.eps.toFixed(2) : '—'}</td>
      <td>${esc(a.freeCashFlow || '—')}</td>
      <td>${esc(a.cashOnHand || '—')}</td>
      <td>${esc(a.totalDebt || '—')}</td>
    </tr>`).join('');
  $('annualBody').innerHTML = `
    <div class="table-scroll">
      <table class="simple">
        <thead><tr>
          <th>Year</th><th>Revenue</th><th>Rev YoY</th><th>GM</th>
          <th>Op Inc</th><th>Net Inc</th><th>EPS</th>
          <th>FCF</th><th>Cash</th><th>Debt</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderClaude(s) {
  const c = s.claude || {};
  const v = c.valuation || {};
  const fairRange = v.fairValueLow != null && v.fairValueHigh != null
    ? `$${v.fairValueLow} – $${v.fairValueHigh}${v.confidence ? ` <span class="neutral">(${esc(v.confidence)} confidence)</span>` : ''}`
    : null;
  const fields = [
    ['Last Analyzed', c.lastAnalyzedAt],
    ['Score', c.score != null ? `${c.score} / ${(c.scoreScale||'5').split('-').pop()}` : null],
    ['Conviction', c.conviction],
    ['Stance', c.stance],
    ['Valuation Method', v.method],
    ['Fair Value Range', fairRange]
  ].filter(([,vv]) => vv != null && vv !== '');

  const catalysts = (c.catalysts || []).map(x => `
    <tr><td><strong>${esc(x.date)}</strong></td><td>${esc(x.event)}</td><td class="impact-${esc(x.impact)}">${esc(x.impact)}</td></tr>`).join('');
  const risks = (c.risks || []).map(x => `
    <tr><td>${esc(x.risk)}</td><td class="sev-${esc(x.severity)}">${esc(x.severity)}</td></tr>`).join('');
  const derived = (c.derivedTags || []).map(t => `<span class="tag-chip">${esc(t)}</span>`).join('');

  const notes = (c.notes || []).map(n => `
    <div class="note">
      <div class="meta">
        <span class="date">${esc(n.date)}</span>
        ${n.type ? `<span class="tag-chip">${esc(n.type)}</span>` : ''}
      </div>
      <div class="body">${esc(n.note)}</div>
      ${renderImages(n.images)}
    </div>`).join('');

  $('claudeBody').innerHTML = `
    <div class="kv-grid" style="margin-bottom:16px">
      ${fields.map(([k,vv]) => `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${vv}</div></div>`).join('')}
    </div>
    ${c.thesis ? `<div style="font-size:15px;line-height:1.6;margin-bottom:18px"><strong style="color:var(--accent)">Thesis: </strong>${esc(c.thesis)}</div>` : ''}
    <div class="case-grid" style="margin-bottom:18px">
      <div class="case bull"><h3>Bull Case</h3><ul>${(c.bullCase||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>
      <div class="case bear"><h3>Bear Case</h3><ul>${(c.bearCase||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>
    </div>
    ${catalysts ? `<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px">Catalysts</h3>
      <div class="table-scroll" style="margin-bottom:18px"><table class="simple"><thead><tr><th>When</th><th>Event</th><th>Impact</th></tr></thead><tbody>${catalysts}</tbody></table></div>` : ''}
    ${risks ? `<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px">Risks</h3>
      <div class="table-scroll" style="margin-bottom:18px"><table class="simple"><thead><tr><th>Risk</th><th>Severity</th></tr></thead><tbody>${risks}</tbody></table></div>` : ''}
    ${derived ? `<div style="margin-bottom:18px"><div class="k" style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px">Derived Tags</div><div class="pill-list">${derived}</div></div>` : ''}
    ${notes ? `<h3 style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px">Analysis Notes</h3>${notes}` : ''}`;
}

function renderNews(s) {
  const items = s.news || [];
  $('newsCount').textContent = items.length;
  if (!items.length) { $('newsBody').innerHTML = '<div class="neutral" style="font-size:13px">No news yet.</div>'; return; }
  $('newsBody').innerHTML = items.map(n => `
    <div class="news-item">
      <div class="date">${esc(n.date)}</div>
      <div>
        <div class="headline">${n.url ? `<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.headline)}</a>` : esc(n.headline)}</div>
        <div class="source">${esc(n.source||'')}</div>
        ${n.summary ? `<div class="summary">${esc(n.summary)}</div>` : ''}
      </div>
      <div class="sentiment sentiment-${esc(n.sentiment||'neutral')}">${esc(n.sentiment||'neutral')}</div>
    </div>`).join('');
}

function renderOwnership(s) {
  const o = s.ownership;
  if (!o) { $('ownershipBody').innerHTML = '<div class="neutral" style="font-size:13px">No ownership data.</div>'; return; }
  const fields = [
    ['As Of', o.asOf],
    ['Institutional', fmtPct(o.institutionalPct)],
    ['Insider', fmtPct(o.insiderPct)],
    ['Short Interest', fmtPct(o.shortInterest)]
  ];
  const holders = (o.topHolders || []).map(h => `<tr><td>${esc(h.name)}</td><td>${fmtPct(h.pct)}</td></tr>`).join('');
  $('ownershipBody').innerHTML = `
    <div class="kv-grid" style="margin-bottom:14px">
      ${fields.map(([k,v]) => `<div class="kv"><div class="k">${esc(k)}</div><div class="v">${v}</div></div>`).join('')}
    </div>
    ${holders ? `<div class="table-scroll"><table class="simple"><thead><tr><th>Top Holder</th><th>%</th></tr></thead><tbody>${holders}</tbody></table></div>` : ''}`;
}

function renderLinks(s) {
  const L = s.links || {};
  const items = [
    ['Investor Relations', L.investorRelations],
    ['SEC Filings', L.secFilings],
    ['Earnings Calls', L.earningsCallTranscripts],
    ['Research Page', L.researchPage]
  ].filter(([,v]) => v);
  if (!items.length) { $('linksBody').innerHTML = '<div class="neutral" style="font-size:13px">No links.</div>'; return; }
  $('linksBody').innerHTML = `<div class="kv-grid">${items.map(([k,v]) =>
    `<div class="kv"><div class="k">${esc(k)}</div><div class="v"><a href="${esc(v)}" target="_blank" rel="noopener">${esc(v)}</a></div></div>`
  ).join('')}</div>`;
}

function renderFooter(s) {
  const m = s.meta || {};
  $('lastUpdated').textContent = m.updatedAt ? `Updated ${m.updatedAt}` : '';
  $('footerMeta').textContent =
    `Schema v${s.schemaVersion || '?'} · Created ${m.createdAt||'—'} · Updated ${m.updatedAt||'—'}` +
    (m.dataSources ? ` · Sources: ${m.dataSources.join(', ')}` : '');
}

// --- Run ---
document.title = `${STOCK.ticker} — ${STOCK.static.name}`;
renderHero(STOCK);
renderUserNotes(STOCK);
renderClaude(STOCK);
renderNews(STOCK);
renderRevenue(STOCK);
renderOwnership(STOCK);
renderStatic(STOCK);
renderDaily(STOCK);
renderQuarterly(STOCK);
renderAnnual(STOCK);
renderLinks(STOCK);
renderFooter(STOCK);

document.addEventListener('keydown', e => { if (e.key === 'Escape') $('lightbox').classList.remove('show'); });
</script>
</body>
</html>
